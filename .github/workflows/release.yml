name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Stable release tag, for example v0.8.0 or v1.0.0
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: manual-release
  cancel-in-progress: false

jobs:
  create-release:
    name: Create stable release
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable release tag: $RELEASE_TAG"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "v$PACKAGE_VERSION" != "$RELEASE_TAG" ]]; then
            echo "package.json version $PACKAGE_VERSION does not match $RELEASE_TAG"
            exit 1
          fi

      - name: Check release target
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $RELEASE_TAG"
            exit 1
          fi

      - name: Verify
        run: pnpm verify

      - name: Pack dry run
        run: pnpm pack --dry-run

      - name: Create and push release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes --latest

      - name: Dispatch npm publish workflow
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh workflow run publish-npm.yml --ref "$RELEASE_TAG"
