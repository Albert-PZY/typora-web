name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Stable release tag, for example v0.8.0 or v1.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: manual-release
  cancel-in-progress: false

jobs:
  create-release:
    name: Create stable release
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable release tag: $RELEASE_TAG"
            exit 1
          fi
          if [[ -z "$RELEASE_TOKEN" ]]; then
            echo "RELEASE_TOKEN secret is required to create tags, releases, and workflow dispatches."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "v$PACKAGE_VERSION" != "$RELEASE_TAG" ]]; then
            echo "package.json version $PACKAGE_VERSION does not match $RELEASE_TAG"
            exit 1
          fi

      - name: Check release target
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release tag already exists: $RELEASE_TAG"
            exit 1
          fi

      - name: Verify
        run: pnpm verify

      - name: Pack dry run
        run: pnpm pack --dry-run

      - name: Prepare release notes
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const tag = process.env.RELEASE_TAG;
          const version = tag.replace(/^v/, "");
          const changelog = fs.readFileSync("CHANGELOG.md", "utf8").split(/\r?\n/);
          const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const headingPattern = new RegExp(`^##\\s+(?:\\[)?${escapedVersion}(?:\\]|\\s|\\()`);
          const start = changelog.findIndex((line) => headingPattern.test(line.trim()));

          if (start === -1) {
            throw new Error(`CHANGELOG.md does not contain release notes for ${version}.`);
          }

          let end = changelog.length;
          for (let index = start + 1; index < changelog.length; index += 1) {
            if (/^##\s+/.test(changelog[index])) {
              end = index;
              break;
            }
          }

          const notes = changelog.slice(start + 1, end).join("\n").trim();
          if (!notes) {
            throw new Error(`Release notes for ${version} are empty.`);
          }

          fs.writeFileSync("release-notes.md", `${notes}\n`, "utf8");
          NODE

      - name: Create and push release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md --latest

      - name: Dispatch npm publish workflow
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh workflow run publish-npm.yml --ref "$RELEASE_TAG"
