name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.8-beta.1 or v1.0.0
        required: true
        type: string
      package_version:
        description: npm package version, for example 0.8.0-beta.1 or 1.0.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+(-beta\.[0-9]+|\.[0-9]+)$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          if [[ ! "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: $PACKAGE_VERSION"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update package version
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: |
          node -e "const fs = require('node:fs'); const path = 'package.json'; const pkg = JSON.parse(fs.readFileSync(path, 'utf8')); pkg.version = process.env.PACKAGE_VERSION; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"
          pnpm install --lockfile-only

      - name: Verify
        run: pnpm verify

      - name: Commit release metadata
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): prepare $RELEASE_TAG"

      - name: Create tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: git tag -a "$RELEASE_TAG" -m "$RELEASE_TAG"

      - name: Push release commit and tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git push origin HEAD:main
          git push origin "$RELEASE_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=()
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes "${args[@]}"
