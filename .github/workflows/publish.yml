name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (e.g. latest, next, beta)"
        required: false
        default: "latest"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org/"
      - run: npm ci
      - run: npm test
      # `prepublishOnly` in package.json builds the lib via
      # `npm run build:lib` right before publish. No explicit build
      # step here.
      - run: npm publish --access public --tag ${{ github.event.inputs.tag || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
