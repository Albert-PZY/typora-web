name: Publish npm

"on":
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate stable release tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          tag="${GITHUB_REF_NAME}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping non-stable tag: $tag"
            echo "publishable=false" >> "$GITHUB_ENV"
            exit 0
          fi
          if [[ "v$package_version" != "$tag" ]]; then
            echo "Tag $tag does not match package.json version $package_version."
            exit 1
          fi
          echo "publishable=true" >> "$GITHUB_ENV"

      - name: Mark manual publish as publishable
        if: ${{ github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "publishable=true" >> "$GITHUB_ENV"

      - name: Verify
        if: ${{ env.publishable == 'true' }}
        run: pnpm verify

      - name: Pack dry run
        if: ${{ env.publishable == 'true' }}
        run: pnpm pack --dry-run

      - name: Check package publish state
        if: ${{ env.publishable == 'true' }}
        id: package
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          if pnpm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "$package_name@$package_version is already published."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "$package_name@$package_version is not published yet."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ env.publishable == 'true' && steps.package.outputs.exists != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks
